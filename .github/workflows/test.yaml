name: 🧪 Test code

on:
  # Run this on every push except master and next
  push:
    branches:
      - "**"
      - "!master"
      - "!next"
  # Run this every week to make sure the latest PocketBase version still works
  schedule:
    - cron: "0 4 * * 6"

env:
  HUSKY: 0

jobs:
  test:
    # Use the latest version of Ubuntu
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      # Checkout repository
      - name: 📥 Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Setup Node
      - name: 📦 Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      # Enable corepack
      - name: ⚙️ Enable corepack
        run: corepack enable && corepack enable npm

      # Install dependencies
      - name: 📦 Install dependencies
        run: npm ci

      # Lint code
      - name: 🧹 Lint code (includes type-check)
        run: npm run lint

      # Check format
      - name: 🧹 Check format
        run: npm run format:check

      # Run tests
      - name: 🧪 Run unit tests
        run: npm run test:unit

      # Setup PocketBase
      - name: 🗄️ Download and setup PocketBase
        run: npm run test:e2e:setup

      # Start PocketBase
      - name: 🚀 Start PocketBase
        run: ./.pocketbase/pocketbase serve &

      # Wait for PocketBase to be ready
      - name: ⏳ Wait for PocketBase
        run: |
          until curl -s --fail http://localhost:8090/api/health; do
            echo 'Waiting for PocketBase...'
            sleep 5
          done

      # Run tests
      - name: 🧪 Run e2e tests
        run: npm run test:e2e
